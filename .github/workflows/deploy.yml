name: Deploy TechBlog Backend

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: techblog-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin \
              536210621377.dkr.ecr.ap-south-1.amazonaws.com

            docker pull 536210621377.dkr.ecr.ap-south-1.amazonaws.com/techblog-backend:latest

            docker stop techblog_backend || true
            docker rm techblog_backend || true

            export DB_URL=$(aws ssm get-parameter --name "/techblog/DB_URL" --with-decryption --query Parameter.Value --output text --region ap-south-1)
            export DB_USERNAME=$(aws ssm get-parameter --name "/techblog/DB_USER" --with-decryption --query Parameter.Value --output text --region ap-south-1)
            export DB_PASSWORD=$(aws ssm get-parameter --name "/techblog/DB_PASSWORD" --with-decryption --query Parameter.Value --output text --region ap-south-1)
            export JWT_SECRET=$(aws ssm get-parameter --name "/techblog/JWT_SECRET" --with-decryption --query Parameter.Value --output text --region ap-south-1)
            export ALLOWED_ORIGINS=$(aws ssm get-parameter --name "/techblog/ALLOWED_ORIGINS" --query Parameter.Value --output text --region ap-south-1)
            export ADMIN_EMAIL=$(aws ssm get-parameter --name "/techblog/ADMIN_EMAIL" --query Parameter.Value --output text --region ap-south-1)
            export ADMIN_PASSWORD=$(aws ssm get-parameter --name "/techblog/ADMIN_PASSWORD" --with-decryption --query Parameter.Value --output text --region ap-south-1)
            export ADMIN_NAME="Aditya Maurya"

            docker run -d \
              --name techblog_backend \
              --restart always \
              -p 8080:8080 \
              -e DB_URL="$DB_URL" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e ALLOWED_ORIGINS="$ALLOWED_ORIGINS" \
              -e APP_ADMIN_EMAIL="$ADMIN_EMAIL" \
              -e APP_ADMIN_PASSWORD="$ADMIN_PASSWORD" \
              -e APP_ADMIN_NAME="$ADMIN_NAME" \
              -e PORT=8080 \
              536210621377.dkr.ecr.ap-south-1.amazonaws.com/techblog-backend:latest

            docker image prune -f